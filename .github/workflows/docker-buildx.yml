name: Build Docker image
on:
  workflow_dispatch:
  schedule:
    - cron: "5 4 1,15 * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".github/dependabot.yml"
      - "build.sh"
      - "clean.sh"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".github/dependabot.yml"
      - "build.sh"
      - "clean.sh"

env:
  DOCKERFILE_DIR: php8
  IMAGE_NAME: hussainweb/drupal-base

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: every job only needs to read the repo
# (checkout + README). Docker Hub pushes use DOCKERHUB_TOKEN, not
# GITHUB_TOKEN; artifact download in `merge` is same-run, which
# doesn't require additional scopes.
permissions:
  contents: read

jobs:
  check-activity:
    name: Check recent registry push
    # Always runs so downstream jobs can reference its output without
    # needing `!cancelled()` / skipped-result gymnastics. On non-schedule
    # events the step short-circuits to should_run=true immediately.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Compare Docker Hub last_updated against threshold
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          THRESHOLD_DAYS: "10"
        run: |
          # Only schedule runs gate on registry activity; every other
          # trigger proceeds unconditionally.
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Scheduled runs fire on the 1st and 15th. A push to main that
          # lands within ~5-6 days of either date would have already
          # rebuilt the whole matrix with fresh OS packages, so the
          # scheduled refresh has nothing meaningful to pick up. 10 days
          # is a middle-ground threshold: it suppresses the "push on the
          # 25th -> rebuild on the 1st" case (6 days) while still letting
          # the 15th refresh proceed after a push on the 2nd (13 days).
          # Any failure to fetch the timestamp defaults to running the
          # build -- we prefer a wasted run over a silently missed one.
          # curl and jq run separately so a network failure or malformed
          # response can't trip the runner's default `set -eo pipefail`
          # and abort the step before this fallback runs.
          resp=$(curl -sf --max-time 30 \
            "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/") || resp=""
          last=$(jq -r '.last_updated // empty' <<<"$resp" 2>/dev/null) || last=""
          if [ -z "$last" ] || [ "$last" = "null" ]; then
            echo "Could not fetch last_updated from Docker Hub; running the build."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          days=$(( ( $(date -u +%s) - $(date -u -d "$last" +%s) ) / 86400 ))
          echo "Last registry push: $last (${days} days ago, threshold ${THRESHOLD_DAYS})"
          if [ "$days" -ge "$THRESHOLD_DAYS" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping scheduled rebuild: registry was updated ${days} days ago."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.php_version }} ${{ matrix.variant }} (${{ matrix.arch.name }})
    needs: [check-activity]
    if: needs.check-activity.outputs.should_run == 'true'
    runs-on: ${{ matrix.arch.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        php_version: ["8.2", "8.3", "8.4", "8.5"]
        variant:
          [
            "apache-trixie",
            "apache-bookworm",
            "fpm-alpine",
            "frankenphp-trixie",
          ]
        arch:
          - { name: amd64, runs_on: ubuntu-24.04 }
          - { name: arm64, runs_on: ubuntu-24.04-arm }
        # On pull_request and scheduled runs, skip PHP 8.2 and 8.3 to keep
        # CI fast. They are only built on direct pushes to main and on
        # workflow_dispatch. The 'none' fallback is a no-op exclude.
        exclude:
          - php_version: ${{ github.event_name != 'push' && '8.2' || 'none' }}
          - php_version: ${{ github.event_name != 'push' && '8.3' || 'none' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
      - name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: hussainweb
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: github.ref == 'refs/heads/main'

      - name: Set up environment variables
        run: |
          echo "PHP_VERSION=${{ matrix.php_version }}" >> $GITHUB_ENV
          echo "VARIANT=${{ matrix.variant }}" >> $GITHUB_ENV
          if [ "${{ matrix.variant }}" = "frankenphp-trixie" ]; then
            echo "WEB_ROOT=/app" >> $GITHUB_ENV
          else
            echo "WEB_ROOT=/var/www/html" >> $GITHUB_ENV
          fi
          if [ "${{ matrix.variant }}" = "fpm-alpine" ]; then
            echo "COMPOSE_FILE=tests/docker-compose.fpm.yml" >> $GITHUB_ENV
          else
            echo "COMPOSE_FILE=tests/docker-compose.yml" >> $GITHUB_ENV
          fi
          echo "CONTAINER_NAME=drupal" >> $GITHUB_ENV

      - name: Build and load Docker image for testing
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.DOCKERFILE_DIR }}/${{ matrix.variant }}/
          load: true
          tags: drupal-test:${{ matrix.php_version }}-${{ matrix.variant }}
          platforms: linux/${{ matrix.arch.name }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          # cache-from only: the push-by-digest step below owns cache-to
          # so we don't write near-identical caches twice per cell. The
          # second build hits buildx's in-process cache populated here.
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.php_version }}-${{ matrix.arch.name }}

      - name: Create test directory structure
        run: |
          rm -rf drupal-root
          mkdir -p drupal-root
          mkdir -p test-results
          chmod 777 drupal-root

      - name: Start Docker containers
        run: |
          docker compose up -d
          # install-drupal.sh handles waiting for container readiness
          docker compose ps

      - name: Install Drupal
        run: |
          chmod +x tests/install-drupal.sh
          # The script uses 'docker compose exec -T drupal', which matches our service name 'drupal'
          if [ "${{ matrix.php_version }}" == "8.2" ]; then
            ./tests/install-drupal.sh ${{ matrix.variant }} "^10"
          else
            ./tests/install-drupal.sh ${{ matrix.variant }} "^11"
          fi

      - name: Run Drupal verification tests
        run: |
          chmod +x tests/verify-drupal.sh
          ./tests/verify-drupal.sh ${{ matrix.variant }}

      - name: Capture logs
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose logs
          echo "=== Container Status ==="
          docker compose ps
          docker compose logs > test-results/docker-logs-${{ matrix.variant }}.txt

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch.name }}
          path: test-results/
          if-no-files-found: ignore

      - name: Clean up
        if: always()
        run: docker compose down -v

      - name: Scan image for vulnerabilities
        # anchore/scan-action v7.4.0, pinned by commit SHA. SHA pinning
        # is mandatory here: the aquasecurity/trivy-action tags were
        # hijacked in a March 2026 supply chain attack (75 of 76 tags
        # force-pushed to an infostealer), so we standardised on
        # SHA-pinned actions for any third-party security tooling.
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: drupal-test:${{ matrix.php_version }}-${{ matrix.variant }}
          severity-cutoff: high
          only-fixed: true
          fail-build: true
          output-format: table

      - name: Build and push by digest
        id: push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.DOCKERFILE_DIR }}/${{ matrix.variant }}/
          platforms: linux/${{ matrix.arch.name }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          # push-by-digest: each runner publishes only its arch as an
          # untagged manifest. The merge job stitches per-arch digests
          # into the tagged multi-arch manifest list via imagetools.
          # If this run fails after a successful push (e.g. arm64 OK but
          # amd64 fails), the orphan digest-only manifest is small JSON
          # whose blobs are shared with any future build of the same
          # content; we rely on Docker Hub GC rather than scripting a
          # cleanup step.
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.php_version }}-${{ matrix.arch.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.php_version }}-${{ matrix.arch.name }}

      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.php_version }} ${{ matrix.variant }} per-arch digests
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ["8.2", "8.3", "8.4", "8.5"]
        variant:
          [
            "apache-trixie",
            "apache-bookworm",
            "fpm-alpine",
            "frankenphp-trixie",
          ]
        exclude:
          - php_version: ${{ github.event_name != 'push' && '8.2' || 'none' }}
          - php_version: ${{ github.event_name != 'push' && '8.3' || 'none' }}
    steps:
      - name: Download per-arch digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.php_version }}-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: hussainweb
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags
        id: tags
        run: |
          # Base tag with full variant name
          TAGS="${{ env.IMAGE_NAME }}:php${{ matrix.php_version }}-${{ matrix.variant }}"

          # For apache-trixie, add the short version tag (e.g., php8.4)
          if [ "${{ matrix.variant }}" = "apache-trixie" ]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:php${{ matrix.php_version }}"
          fi

          # For fpm-alpine, add the short -alpine tag (e.g., php8.4-alpine)
          if [ "${{ matrix.variant }}" = "fpm-alpine" ]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:php${{ matrix.php_version }}-alpine"
          fi

          # For the latest PHP version on apache-trixie, add the latest tag
          if [ "${{ matrix.php_version }}" = "8.5" ] && [ "${{ matrix.variant }}" = "apache-trixie" ]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          # Build the -t arg list from comma-separated TAGS.
          IFS=',' read -ra TAGS_ARR <<< "${{ steps.tags.outputs.tags }}"
          TAG_ARGS=()
          for t in "${TAGS_ARR[@]}"; do
            TAG_ARGS+=("-t" "$t")
          done
          # Reference each per-arch image by its digest. The artifact
          # download wrote one empty file per digest into /tmp/digests,
          # with the digest hash as the filename.
          REFS=()
          for d in *; do
            REFS+=("${{ env.IMAGE_NAME }}@sha256:${d}")
          done
          docker buildx imagetools create "${TAG_ARGS[@]}" "${REFS[@]}"

      - name: Inspect resulting multi-arch image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:php${{ matrix.php_version }}-${{ matrix.variant }}

  dockerhub-readme:
    name: Sync Docker Hub description
    needs: merge
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: hussainweb
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: hussainweb/drupal-base
          short-description: "Drupal-ready PHP base images (Apache/FPM/FrankenPHP) for CI, dev, and production."
          readme-filepath: ./README.md
